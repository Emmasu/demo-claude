name: demo-claude
region: sgp

ingress:
  rules:
    # BTC Greeks page — strip /btc prefix before forwarding to service
    - component:
        name: btc-greeks
        preserve_path_prefix: false
      match:
        path:
          prefix: /btc
    # Proxy calls from BTC Greeks JS — keep /proxy prefix
    - component:
        name: btc-greeks
        preserve_path_prefix: true
      match:
        path:
          prefix: /proxy
    # Course notes — everything else goes to static site
    - component:
        name: course-notes
      match:
        path:
          prefix: /

static_sites:
  - name: course-notes
    github:
      repo: Emmasu/demo-claude
      branch: main
      deploy_on_push: true
    source_dir: 6-lesson
    index_document: index.html
    error_document: index.html

services:
  - name: btc-greeks
    github:
      repo: Emmasu/demo-claude
      branch: main
      deploy_on_push: true
    source_dir: 4-option
    run_command: python3 server.py
    environment_slug: python
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: CONVEX_URL
        value: https://small-bulldog-987.convex.cloud
      - key: DERIBIT_CALL
        value: BTC-27MAR26-74000-C
      - key: DERIBIT_PUT
        value: BTC-27MAR26-74000-P
      - key: MNT_CALL
        value: MNT-27MAR26-0.76-C-USDT

workers:
  - name: fetcher
    github:
      repo: Emmasu/demo-claude
      branch: main
      deploy_on_push: true
    source_dir: 4-option
    run_command: python3 fetcher.py
    environment_slug: python
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: CONVEX_URL
        value: https://small-bulldog-987.convex.cloud
      - key: DERIBIT_CALL
        value: BTC-27MAR26-74000-C
      - key: DERIBIT_PUT
        value: BTC-27MAR26-74000-P
      - key: MNT_CALL
        value: MNT-27MAR26-0.76-C-USDT
